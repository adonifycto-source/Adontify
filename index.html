<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Adonify — Maintenance</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:    #070F18;
    --card:  #0D1B2A;
    --border:#1C3050;
    --amber: #F5A623;
    --muted: #5A7A9A;
    --ice:   #E8F4FD;
  }

  body {
    background: var(--bg);
    color: var(--ice);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 32px;
    -webkit-font-smoothing: antialiased;
  }

  /* Ambient glow */
  body::before {
    content: '';
    position: fixed;
    width: 600px; height: 400px;
    top: 50%; left: 50%;
    transform: translate(-50%, -60%);
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(245,166,35,.1) 0%, transparent 70%);
    pointer-events: none;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 48px;
    opacity: .9;
  }

  .logo-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 24px;
    font-weight: 900;
    color: var(--amber);
    letter-spacing: 0.04em;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 52px 48px;
    max-width: 480px;
    width: 100%;
    position: relative;
  }

  .icon {
    font-size: 42px;
    margin-bottom: 20px;
    display: block;
  }

  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 36px;
    font-weight: 900;
    color: #fff;
    margin-bottom: 12px;
    letter-spacing: -0.01em;
  }

  p {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 32px;
  }

  .status-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--amber);
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--amber);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: .4; transform: scale(.8); }
  }

  .divider {
    width: 48px; height: 2px;
    background: var(--amber);
    border-radius: 2px;
    margin: 28px auto;
    opacity: .35;
  }

  .email {
    font-size: 13px;
    color: var(--muted);
  }

  .email a {
    color: var(--amber);
    text-decoration: none;
  }

  .email a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="logo">
  <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
    <polygon points="4,28 14,4 24,16 28,28" fill="#1A3A5C"/>
    <polygon points="4,28 14,4 10,28" fill="#0D2240"/>
    <polyline points="7,26 10,17 14,4" fill="none" stroke="#F5A623" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="7" cy="26" r="2.2" fill="#F5A623"/>
    <circle cx="10" cy="17" r="2.2" fill="#F5A623"/>
    <polygon points="14,4 17,12 11,12" fill="#F5A623"/>
  </svg>
  <span class="logo-text">ADONIFY</span>
</div>

<div class="card">
  <span class="icon">🔧</span>
  <h1>Maintenance in Progress</h1>
  <p>We're making improvements to Adonify. The site will be back up shortly — thanks for your patience.</p>

  <div class="status-row">
    <div class="dot"></div>
    Actively working on it
  </div>

  <div class="divider"></div>

  <p class="email">
    Questions? Reach us at <a href="mailto:hello@adonify.io">hello@adonify.io</a>
  </p>
</div>

</body>
</html>
